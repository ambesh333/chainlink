version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: chainlink_agent_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: chainlink_agent_db
    ports:
      - "5433:5432"
    volumes:
      - chainlink_db_data:/var/lib/postgresql/data

volumes:
  chainlink_db_data:
