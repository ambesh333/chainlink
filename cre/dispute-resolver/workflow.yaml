# ==========================================================================
# CRE WORKFLOW SETTINGS FILE — Dispute Resolver
# ==========================================================================
# Listens for DisputeRaised events on EscrowMarketplace, fetches dispute
# context, calls Gemini AI via Confidential HTTP, and writes resolution
# back on-chain via DisputeConsumer contract.

# ==========================================================================
staging-settings:
  user-workflow:
    workflow-name: "dispute-resolver-staging"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.staging.json"
    secrets-path: "../secrets.yaml"

# ==========================================================================
production-settings:
  user-workflow:
    workflow-name: "dispute-resolver-production"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.production.json"
    secrets-path: "../secrets.yaml"
