# CRE Secrets — stored in Vault DON.
# For simulation, export the env vars listed below.
#
# Export before running simulate:
#   export OPENAI_API_KEY_VALUE="sk-proj-..."
#   export GEMINI_API_KEY_VALUE="AIzaSy..."
#   export BACKEND_URL_VALUE="http://localhost:3001/api"

secretsNames:
    OPENAI_API_KEY:
        - OPENAI_API_KEY_VALUE
    GEMINI_API_KEY:
        - GEMINI_API_KEY_VALUE
    BACKEND_URL:
        - BACKEND_URL_VALUE
