# ==========================================================================
# CRE WORKFLOW SETTINGS FILE — Workflow Engine
# ==========================================================================
# Cron-triggered meta-workflow that interprets dynamic JSON workflow
# definitions fetched from the backend. Executes all active workflows
# and writes audit reports on-chain.

# ==========================================================================
staging-settings:
  user-workflow:
    workflow-name: "workflow-engine-staging"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.staging.json"
    secrets-path: "../secrets.yaml"

# ==========================================================================
production-settings:
  user-workflow:
    workflow-name: "workflow-engine-production"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.production.json"
    secrets-path: "../secrets.yaml"
